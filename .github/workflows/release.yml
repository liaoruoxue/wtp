name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: wtp-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: wtp-aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: wtp-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: wtp-aarch64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: wtp-x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc

      - name: Build (Windows, no fuzzy)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }} --no-default-features

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz wtp
          cd ../../..
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/wtp.exe" -DestinationPath "${{ matrix.name }}.zip"
          (Get-FileHash "${{ matrix.name }}.zip" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.name }}.zip" | Out-File -Encoding ascii "${{ matrix.name }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.zip.sha256
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          CHECKSUMS=$(cat artifacts/*.sha256 2>/dev/null | sort)

          {
            echo "## What's Changed"
            echo ""
            echo "${LOG}"
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| macOS | x86_64 | \`wtp-x86_64-apple-darwin.tar.gz\` |"
            echo "| macOS | Apple Silicon | \`wtp-aarch64-apple-darwin.tar.gz\` |"
            echo "| Linux | x86_64 | \`wtp-x86_64-unknown-linux-gnu.tar.gz\` |"
            echo "| Linux | aarch64 | \`wtp-aarch64-unknown-linux-gnu.tar.gz\` |"
            echo "| Windows | x86_64 | \`wtp-x86_64-pc-windows-msvc.zip\` |"
            echo ""
            echo "> **Note:** Windows build does not include fuzzy finder (skim) support."
            echo ""
            echo "## Checksums (SHA-256)"
            echo ""
            echo "\`\`\`"
            echo "${CHECKSUMS}"
            echo "\`\`\`"
          } > notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: artifacts/*
          generate_release_notes: false
